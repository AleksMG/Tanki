<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b12;--panel:#0f1420;--panel2:#151c2c;--border:#1c2537;
  --accent:#4f8eff;--green:#2ecc71;--red:#e74c3c;--yellow:#f1c40f;
  --cyan:#00d2d3;--purple:#a55eea;--orange:#f39c12;--pink:#fd79a8;
  --text:#c8d6e5;--muted:#576574;--dim:#222f3e;

}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px}

header h1{font-size:14px;font-weight:800;letter-spacing:1.2px;color:var(--accent);white-space:nowrap}
.hsep{width:1px;height:22px;background:var(--border)}
.hstat{font-size:11px;color:var(--muted);white-space:nowrap}.hstat b{color:var(--text);font-weight:600}
.spacer{flex:1}
select,button{font-family:var(--sans);font-size:11px;border:1px solid var(--border);border-radius:4px;background:var(--panel2);color:var(--text);padding:4px 10px;cursor:pointer;transition:.15s}

.crow{display:flex;align-items:center;gap:4px;font-size:10px;margin-bottom:2px}

<body>
<div id="app">
  <header>

        <h2 id="ov-title">CORTEX ARENA</h2>

    <div class="bsec"><div class="ptitle">Leaderboard</div><table class="lb"><thead><tr><th>#</th><th>Name</th><th>K</th><th>D</th><th>Dmg</th><th>W</th></tr></thead><tbody id="lb-body"></tbody></table></div>
  </div>
</div>

<script type="module">

// ═══════════════════════════════════════════════════════════════════════════
// 1. LOGGER — Structured logging with levels and UI integration
// ═══════════════════════════════════════════════════════════════════════════

class Logger {
  static Level = Object.freeze({ DEBUG: 0, INFO: 1, WARN: 2, ERROR: 3 });

  constructor(minLevel = Logger.Level.INFO) {
    this._level = minLevel;
    this._entries = [];
    this._maxEntries = 200;
    this._listeners = [];
  }

  debug(ctx, msg, data) { this._log(Logger.Level.DEBUG, ctx, msg, data); }
  info(ctx, msg, data)  { this._log(Logger.Level.INFO, ctx, msg, data); }
  warn(ctx, msg, data)  { this._log(Logger.Level.WARN, ctx, msg, data); }
  error(ctx, msg, data) { this._log(Logger.Level.ERROR, ctx, msg, data); }

  onEntry(fn) { this._listeners.push(fn); }
  getEntries(level) { return level != null ? this._entries.filter(e => e.level >= level) : [...this._entries]; }

  _log(level, context, message, data) {
    if (level < this._level) return;
    const names = ['DBG', 'INF', 'WRN', 'ERR'];
    const entry = {
      level, context, message, data,
      timestamp: performance.now(),
      label: names[level] || '???',
    };
    this._entries.push(entry);
    if (this._entries.length > this._maxEntries) this._entries.shift();

    const consoleFn = level >= 3 ? console.error : level >= 2 ? console.warn : console.log;
    consoleFn(`[${entry.label}][${context}] ${message}`, data ?? '');

    for (const fn of this._listeners) {
      try { fn(entry); } catch (e) { console.error('Logger listener error', e); }
    }
  }
}

const logger = new Logger(Logger.Level.DEBUG);

// ═══════════════════════════════════════════════════════════════════════════
// 2. CORTEX LOADER — Dynamic import with multiple path fallbacks
//    Handles: GitHub Pages, local dev, subfolders, CDN
// ═══════════════════════════════════════════════════════════════════════════

class CortexLoader {
  /**
   * Attempts to load Cortex2Brain from multiple paths.
   * Returns the constructor or throws with diagnostics.
   */
  static async load() {
    const statusEl = document.getElementById('load-status');
    const errorEl = document.getElementById('load-error');

    // Build candidate paths relative to this HTML file
    const base = new URL('.', window.location.href).href;
    const paths = [
      './cortex.js',
      './core/cortex.js',
      '../cortex.js',
      './js/cortex.js',
      './src/cortex.js',
      './lib/cortex.js',
      `${base}cortex.js`,
    ];

    // Deduplicate resolved URLs
    const tried = new Set();
    const errors = [];

    for (const path of paths) {
      let resolved;
      try {
        resolved = new URL(path, base).href;
      } catch {
        resolved = path;
      }
      if (tried.has(resolved)) continue;
      tried.add(resolved);

      if (statusEl) statusEl.textContent = `Trying: ${path}`;
      logger.info('Loader', `Attempting import: ${resolved}`);

      try {
        const module = await import(resolved);

        // Validate: must export Cortex2Brain as a constructor
        const Ctor = module.Cortex2Brain || module.default?.Cortex2Brain || module.default;
        if (typeof Ctor !== 'function') {
          throw new Error(`Module loaded but Cortex2Brain is ${typeof Ctor}, not a function`);
        }

        // Smoke test: can we instantiate?
        const test = new Ctor({ seed: '__smoke_test__' });
        if (typeof test.forward !== 'function') {
          throw new Error('Cortex2Brain instance missing forward() method');
        }
        if (typeof test.learn !== 'function' && typeof test.tdLearn !== 'function') {
          throw new Error('Cortex2Brain instance missing learn()/tdLearn() method');
        }

        logger.info('Loader', `✓ Loaded from ${resolved}`);
        if (statusEl) statusEl.textContent = `✓ Loaded from ${path}`;
        return Ctor;
      } catch (err) {
        const msg = `✗ ${path}: ${err.message}`;
        errors.push(msg);
        logger.warn('Loader', msg);
      }
    }

    // Also check if it's on window (script tag fallback)
    if (typeof window.Cortex2Brain === 'function') {
      logger.info('Loader', '✓ Found Cortex2Brain on window (script tag)');
      if (statusEl) statusEl.textContent = '✓ Loaded from global scope';
      return window.Cortex2Brain;
    }

    // All paths failed
    const fullError = `Failed to load cortex.js from any path:\n\n${errors.join('\n')}\n\nFile structure required:\n  index.html\n  cortex.js  ← place here`;
    logger.error('Loader', fullError);

    if (errorEl) {
      errorEl.innerHTML = `<div class="err">${fullError}</div>`;
    }
    throw new Error(fullError);
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// 3. MATH UTILITIES — Pure functions, no side effects
// ═══════════════════════════════════════════════════════════════════════════

const clamp = (v, mn, mx) => v < mn ? mn : v > mx ? mx : v;
const lerp  = (a, b, t) => a + (b - a) * clamp(t, 0, 1);
const normAngle = a => { a %= 2*Math.PI; if(a>Math.PI)a-=2*Math.PI; if(a<-Math.PI)a+=2*Math.PI; return a; };

const V2 = Object.freeze({
  create:   (x=0,y=0) => ({x,y}),
  add:      (a,b) => ({x:a.x+b.x, y:a.y+b.y}),
  sub:      (a,b) => ({x:a.x-b.x, y:a.y-b.y}),
  scale:    (v,s) => ({x:v.x*s, y:v.y*s}),
  len:      v => Math.sqrt(v.x*v.x+v.y*v.y),
  lenSq:    v => v.x*v.x+v.y*v.y,
  norm:     v => { const l=V2.len(v)||1; return {x:v.x/l,y:v.y/l}; },
  dist:     (a,b) => V2.len(V2.sub(a,b)),
  distSq:   (a,b) => V2.lenSq(V2.sub(a,b)),
  dot:      (a,b) => a.x*b.x+a.y*b.y,
  angle:    v => Math.atan2(v.y,v.x),
  fromAngle:(a,l=1) => ({x:Math.cos(a)*l, y:Math.sin(a)*l}),
  perp:     v => ({x:-v.y, y:v.x}),
  copy:     v => ({x:v.x, y:v.y}),
});

// ═══════════════════════════════════════════════════════════════════════════
// 4. DOMAIN ENTITIES — Pure data, no behavior (Single Responsibility)
// ═══════════════════════════════════════════════════════════════════════════

class TankEntity {
  constructor(id, name, color, pos) {
    this.id = id;
    this.name = name;
    this.color = color;
    this.pos = V2.copy(pos);
    this.prevPos = V2.copy(pos);
    this.angle = Math.random() * Math.PI * 2;
    this.turretAngle = this.angle;
    this.hp = 100;
    this.maxHp = 100;
    this.alive = true;
    this.reload = 0;
    this.reloadTime = 22;
    this.respawnTimer = 0;
    this.cortex = null; // injected separately (D: Dependency Inversion)
    this.kills = 0;
    this.deaths = 0;
    this.totalDamage = 0;
    this.shotsFired = 0;
    this.shotsHit = 0;
    this.wins = 0;
    this.lastReward = 0;
    this.lastHitBy = null;
    this.pendingEvents = [];
    this.trail = [];
    this.trailMax = 25;
  }
  get accuracy() { return this.shotsFired > 0 ? this.shotsHit / this.shotsFired : 0; }
}

class BulletEntity {
  constructor(x, y, vx, vy, owner, dmg = 12) {
    this.pos = {x, y};
    this.vel = {x: vx, y: vy};
    this.owner = owner;
    this.life = 100;
    this.dmg = dmg;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// 5. SERVICES — Each with a single responsibility (S), narrow API (I)
// ═══════════════════════════════════════════════════════════════════════════

// ── 5a. Physics ───────────────────────────────────────────────────────────

class PhysicsService {
  constructor(w, h) { this.w = w; this.h = h; }

  tryMove(pos, vel, r, walls, tanks, skipId) {
    const nx = pos.x + vel.x, ny = pos.y + vel.y;
    if (this.hitsWall(nx, ny, r, walls) || this.hitsTank(nx, ny, r, tanks, skipId)) return null;
    return { x: clamp(nx, r, this.w - r), y: clamp(ny, r, this.h - r) };
  }

  trySlide(pos, vel, r, walls, tanks, skipId) {
    return this.tryMove(pos, vel, r, walls, tanks, skipId)
        || this.tryMove(pos, {x:vel.x,y:0}, r, walls, tanks, skipId)
        || this.tryMove(pos, {x:0,y:vel.y}, r, walls, tanks, skipId);
  }

  hitsWall(x, y, r, walls) {
    for (let i = 0; i < walls.length; i++) {
      const w = walls[i];
      const cx = clamp(x, w.x, w.x+w.w), cy = clamp(y, w.y, w.y+w.h);
      if ((cx-x)**2 + (cy-y)**2 < r*r) return true;
    }
    return false;
  }

  hitsTank(x, y, r, tanks, skipId) {
    const rr = (r*1.8)**2;
    for (let i = 0; i < tanks.length; i++) {
      const t = tanks[i];
      if (!t.alive || t.id === skipId) continue;
      if (V2.distSq({x,y}, t.pos) < rr) return true;
    }
    return false;
  }

  pointInWall(x, y, walls) {
    for (const w of walls) if (x>=w.x && x<=w.x+w.w && y>=w.y && y<=w.y+w.h) return true;
    return false;
  }

  raycast(ox, oy, dx, dy, max, walls) {
    const steps = Math.ceil(max / 4);
    for (let i = 1; i <= steps; i++) {
      const t = (i/steps)*max;
      if (this.pointInWall(ox+dx*t, oy+dy*t, walls)) return t;
    }
    return max;
  }

  nearestWall(pos, walls) {
    let best = Infinity, bx = 0, by = 0;
    for (const w of walls) {
      const cx = clamp(pos.x, w.x, w.x+w.w), cy = clamp(pos.y, w.y, w.y+w.h);
      const d = V2.dist(pos, {x:cx,y:cy});
      if (d < best) { best = d; bx = cx-pos.x; by = cy-pos.y; }
    }
    return { dist: best, dx: bx, dy: by };
  }
}

// ── 5b. Cortex Adapter (D: isolates arena from brain internal API) ────────

class CortexAdapter {
  /** @param {Function} BrainCtor - the Cortex2Brain constructor */
  constructor(BrainCtor, seed, config = {}) {
    if (typeof BrainCtor !== 'function') {
      throw new Error(`CortexAdapter: BrainCtor must be function, got ${typeof BrainCtor}`);
    }
    this._brain = new BrainCtor({
      seed,
      lr: config.lr ?? 0.015,
      gamma: config.gamma ?? 0.99,
      lambda: config.lambda ?? 0.95,
      hebbianRate: config.hebbianRate ?? 0.002,
      taskSpec: { inputComplexity: 0.7, temporalDepth: 0.5, socialComplexity: 0.3 },
    });
    this._brain.configurePersonality({
      traits: {
        bravery:    0.3 + Math.random() * 0.5,
        aggression: 0.3 + Math.random() * 0.5,
        curiosity:  0.3 + Math.random() * 0.4,
        patience:   0.3 + Math.random() * 0.4,
      },
    });
    this._lastForward = null;
    logger.debug('CortexAdapter', `Created brain seed=${seed}`);
  }

  forward(sensors, reward, combatEvents = null) {
    try {
      this._lastForward = this._brain.forward(sensors, reward, combatEvents);
      return this._lastForward;
    } catch (e) {
      logger.error('CortexAdapter', `forward() failed: ${e.message}`);
      return { output: new Array(16).fill(0), predictionError: 0, reflexTriggered: false, emotionalStateName: null, stepCount: 0 };
    }
  }

  learnFromReward(reward) {
    try {
      return this._brain.tdLearn([], [], reward);
    } catch (e) {
      logger.error('CortexAdapter', `tdLearn() failed: ${e.message}`);
      return { tdError: 0 };
    }
  }

  getEmotions() {
    try { return this._brain.getEmotions(); }
    catch { return {}; }
  }

  getDebugInfo() {
    try { return this._brain.getDebugInfo(); }
    catch { return {}; }
  }

  getStats() {
    try { return this._brain.getStats(); }
    catch { return {}; }
  }

  getStep()             { return this._brain.step ?? 0; }
  getCumulativeReward() { return this._brain.cumulativeReward ?? 0; }

  reset() {
    try { this._brain.resetEpisode(); }
    catch (e) { logger.error('CortexAdapter', `reset() failed: ${e.message}`); }
  }
}

// ── 5c. Sensor Builder (S: only builds 64-dim sensor vectors) ─────────────
// CONTRACT: sensor indices match Cortex2Brain's default inputSchema exactly

class SensorBuilder {
  constructor(aw, ah, physics) {
    this.aw = aw; this.ah = ah;
    this.maxDist = Math.sqrt(aw*aw + ah*ah);
    this.physics = physics;
  }

  /** @returns {Float32Array} 64-dim normalized sensor vector */
  build(tank, allTanks, bullets, walls, tick) {
    const s = new Float32Array(64);
    const alive = allTanks.filter(o => o.alive && o.id !== tank.id);

    let nearest = null, nDist = Infinity;
    for (const o of alive) { const d = V2.dist(tank.pos, o.pos); if (d < nDist) { nDist = d; nearest = o; } }

    if (nearest) {
      const rel = V2.sub(nearest.pos, tank.pos);
      s[0]  = rel.x / this.maxDist;
      s[1]  = rel.y / this.maxDist;
      s[2]  = 1 - clamp(nDist / this.maxDist, 0, 1);
      s[3]  = nearest.hp / nearest.maxHp;
      const aToE = V2.angle(rel);
      const relA = normAngle(aToE - tank.turretAngle);
      s[25] = relA / Math.PI;
      const eToMe = V2.sub(tank.pos, nearest.pos);
      const eRelA = normAngle(V2.angle(eToMe) - nearest.turretAngle);
      s[26] = Math.abs(eRelA) < Math.PI/4 ? 1 : -1;
      s[27] = Math.abs(eRelA) < Math.PI/3 ? 1 : 0;
      s[28] = Math.abs(relA)  < Math.PI/3 ? 1 : 0;
      s[29] = clamp((1-clamp(nDist/300,0,1))*0.6 + (Math.abs(eRelA)<Math.PI/4?0.4:0), 0, 1);
      const toEN = V2.norm(rel), perp = V2.perp(toEN);
      s[30] = perp.x;
      s[31] = perp.y;
      s[32] = normAngle(nearest.turretAngle - aToE) / Math.PI;
      s[33] = clamp(1 - Math.abs(relA)/(Math.PI/3), -1, 1);
      const pred = V2.add(nearest.pos, V2.fromAngle(nearest.angle, 20));
      const pRel = V2.sub(pred, tank.pos);
      s[35] = pRel.x / this.maxDist;
      s[36] = pRel.y / this.maxDist;
    }

    const nw = this.physics.nearestWall(tank.pos, walls);
    s[4]  = nw.dx / 200;
    s[5]  = nw.dy / 200;
    s[6]  = 1 - clamp(nw.dist / 200, 0, 1);
    s[7]  = tank.pos.x / this.aw * 2 - 1;
    s[8]  = tank.pos.y / this.ah * 2 - 1;
    s[9]  = tank.hp / tank.maxHp;
    s[10] = clamp(tank.lastReward / 5, -1, 1);
    s[11] = clamp(tank.totalDamage / 500, 0, 1);
    s[12] = tank.hp / tank.maxHp;
    s[13] = tank.reload / tank.reloadTime;
    s[14] = clamp(tick / 5000, 0, 1);
    s[23] = clamp(tank.deaths / 10, 0, 1);
    s[24] = alive.length <= 1 ? 1 : 0;
    s[34] = 1 - tank.hp / tank.maxHp;

    const fwd = V2.fromAngle(tank.angle);
    s[37] = this.physics.raycast(tank.pos.x, tank.pos.y, fwd.x, fwd.y, 100, walls) < 50 ? 1 : 0;

    let maxThr = 0, dodgeD = {x:0,y:0};
    for (const b of bullets) {
      if (b.owner === tank.id) continue;
      const tb = V2.sub(tank.pos, b.pos);
      const d = V2.len(tb);
      if (d > 200) continue;
      const bd = V2.norm(b.vel), md = V2.norm(tb);
      const dot = V2.dot(bd, md);
      if (dot > 0.3) { const thr = (1-d/200)*dot; if (thr > maxThr) { maxThr = thr; dodgeD = V2.perp(bd); } }
    }
    s[38] = maxThr;
    s[39] = dodgeD.x;
    s[40] = dodgeD.y;
    s[41] = nw.dist < 40 ? 1 : clamp(nw.dist/200, 0, 1);
    s[42] = nw.dist < 30 ? (nw.dx > 0 ? -1 : 1) : 0;

    for (let i = 0; i < 5; i++) {
      const a = tank.angle + (i-2)*Math.PI/4;
      const dir = V2.fromAngle(a);
      s[43+i] = 1 - clamp(this.physics.raycast(tank.pos.x, tank.pos.y, dir.x, dir.y, 120, walls)/120, 0, 1);
    }

    const sorted = alive.map(o => ({ dist: V2.dist(tank.pos,o.pos), angle: normAngle(V2.angle(V2.sub(o.pos,tank.pos))-tank.turretAngle), o })).sort((a,b) => a.dist-b.dist);
    for (let i = 0; i < Math.min(2, sorted.length); i++) {
      s[48+i*2] = sorted[i].angle / Math.PI;
      s[49+i*2] = 1 - clamp(sorted[i].dist / this.maxDist, 0, 1);
    }

    s[52] = Math.cos(tank.turretAngle);
    s[53] = Math.sin(tank.turretAngle);
    s[54] = clamp(alive.length / 12, 0, 1);
    s[55] = tank.reload <= 0 ? 1 : 0;

    if (sorted.length > 1) {
      const sn = sorted[1];
      const r2 = V2.sub(sn.o.pos, tank.pos);
      s[56] = r2.x / this.maxDist;
      s[57] = r2.y / this.maxDist;
      s[58] = sn.o.hp / sn.o.maxHp;
      s[59] = sn.angle / Math.PI;
    }

    s[60] = tank.pos.x / this.aw;
    s[61] = 1 - tank.pos.x / this.aw;
    s[62] = tank.pos.y / this.ah;
    s[63] = 1 - tank.pos.y / this.ah;

    return s;
  }
}

// ── 5d. Output Interpreter ────────────────────────────────────────────────

class OutputInterpreter {
  interpret(result, tank, nearest) {
    const o = result.output;
    let moveAngle = Math.atan2(o[1]||0, o[0]||0);

    let aimAngle = tank.turretAngle;
    if (Math.abs(o[2]||0) > 0.1 || Math.abs(o[3]||0) > 0.1) aimAngle = Math.atan2(o[3]||0, o[2]||0);
    else if (nearest) aimAngle = V2.angle(V2.sub(nearest.pos, tank.pos));

    const throttle = clamp(o[4]||0, -1, 1);
    const speed = 0.4 + Math.abs(throttle) * 0.6;
    const shoot = (o[6]||0) > 0.2;

    moveAngle += (o[8]||0) * 0.3;

    const retreat = clamp(o[10]||0, 0, 1);
    if (retreat > 0.5 && nearest) moveAngle = lerp(moveAngle, V2.angle(V2.sub(tank.pos, nearest.pos)), retreat);

    const flank = clamp(o[11]||0, 0, 1);
    if (flank > 0.3 && nearest) moveAngle = lerp(moveAngle, V2.angle(V2.perp(V2.norm(V2.sub(nearest.pos, tank.pos)))), flank*0.5);

    return { moveAngle, speed, aimAngle, shoot };
  }
}

// ── 5e. Reward Shaper ─────────────────────────────────────────────────────

class RewardShaper {
  constructor(physics) { this.physics = physics; }

  compute(tank, nearest, walls, prevPos) {
    let r = 0.005;
    if (nearest) {
      const d = V2.dist(tank.pos, nearest.pos);
      if (d > 80 && d < 250) r += 0.02;
      else if (d < 40) r -= 0.015;
      else if (d > 400) r -= 0.005;
      const aimD = Math.abs(normAngle(tank.turretAngle - V2.angle(V2.sub(nearest.pos, tank.pos))));
      if (aimD < Math.PI/6) r += 0.02;
      else if (aimD < Math.PI/3) r += 0.008;
      const eAimD = Math.abs(normAngle(nearest.turretAngle - V2.angle(V2.sub(tank.pos, nearest.pos))));
      if (eAimD > Math.PI/3) r += 0.01;
      if (eAimD > Math.PI/2) r += 0.015;
    }
    const nw = this.physics.nearestWall(tank.pos, walls);
    if (nw.dist < 25) r -= 0.025;
    const m = 30;
    if (tank.pos.x < m || tank.pos.x > this.physics.w-m || tank.pos.y < m || tank.pos.y > this.physics.h-m) r -= 0.02;
    if (prevPos) { if (V2.dist(tank.pos, prevPos) < 0.3) r -= 0.015; else r += 0.005; }
    return clamp(r, -0.2, 0.2);
  }
}

// ── 5f. Wall Generator ────────────────────────────────────────────────────

class WallGenerator {
  generate(w, h, count, seed) {
    const walls = [];
    let s = this._hash(seed);
    for (let i = 0; i < count; i++) {
      s = this._nx(s); let ww = 50 + (s/4294967296)*140;
      s = this._nx(s); let wh = 10 + (s/4294967296)*14;
      s = this._nx(s); if ((s/4294967296) > 0.5) [ww,wh] = [wh,ww];
      s = this._nx(s); const wx = 60 + (s/4294967296)*(w-120-ww);
      s = this._nx(s); const wy = 60 + (s/4294967296)*(h-120-wh);
      walls.push({x:wx,y:wy,w:ww,h:wh});
    }
    return walls;
  }
  _hash(seed) { let h=0x811c9dc5; const s='w_'+seed; for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,0x01000193)} return(h>>>0)||1; }
  _nx(s) { s^=s<<13; s^=s>>>17; s^=s<<5; return(s>>>0)||1; }
}

// ── 5g. Particle System ───────────────────────────────────────────────────

class ParticleSystem {
  constructor() { this.items = []; }
  emit(x,y,color,count,speed) {
    for (let i=0;i<count;i++) { const a=Math.random()*Math.PI*2, sp=Math.random()*speed;
      this.items.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,color,life:12+(Math.random()*20)|0,maxLife:32}); }
  }
  update() {
    for (let i=this.items.length-1;i>=0;i--) {
      const p=this.items[i]; p.x+=p.vx; p.y+=p.vy; p.vx*=.94; p.vy*=.94;
      if(--p.life<=0) this.items.splice(i,1); }
  }
}

// ── 5h. Event Log (battle events, separate from Logger) ───────────────────

class BattleLog {
  constructor(max=80) { this.entries=[]; this.max=max; }
  add(type,msg,tick) { this.entries.unshift({type,msg,tick}); if(this.entries.length>this.max)this.entries.length=this.max; }
  clear() { this.entries=[]; }
}

// ═══════════════════════════════════════════════════════════════════════════
// 6. GAME SIMULATION — Orchestrator (O: open for extension via services)
//    Depends on abstractions, not concretions (D)
// ═══════════════════════════════════════════════════════════════════════════

const NAMES  = ['Apex','Bravo','Cipher','Delta','Echo','Forge','Ghost','Havoc','Iron','Jinx','Krait','Lynx'];
const COLORS = ['#4f8eff','#e74c3c','#2ecc71','#f1c40f','#a55eea','#00d2d3','#f39c12','#fd79a8','#1abc9c','#8854d0','#eb3b5a','#78e08f'];

const SIM_CFG = Object.freeze({
  TANK_R: 14, BARREL_LEN: 22, BULLET_SPEED: 6,
  TANK_SPEED: 2.4, TANK_ROT: 0.06, TURRET_ROT: 0.09,
  RESPAWN: 120, BULLET_DMG: 12,
  R_HIT: 2.0, R_KILL: 8.0, R_DAMAGED: -1.5, R_DEATH: -8.0, R_WALL_BUMP: -0.03,
  WALL_COUNT: 7,
});

class GameSimulation {
  constructor(aw, ah, BrainCtor) {
    this.AW = aw; this.AH = ah;
    this.BrainCtor = BrainCtor;
    this.cfg = SIM_CFG;

    // Inject services (D)
    this.physics   = new PhysicsService(aw, ah);
    this.sensors   = new SensorBuilder(aw, ah, this.physics);
    this.interp    = new OutputInterpreter();
    this.rewards   = new RewardShaper(this.physics);
    this.wallGen   = new WallGenerator();
    this.particles = new ParticleSystem();
    this.log       = new BattleLog();

    this.tanks = []; this.bullets = []; this.walls = [];
    this.tick = 0; this.round = 1;
    this.running = false; this.speed = 2; this.tankCount = 6;
    this.selectedTankId = null;
    this.leaderboard = new Map();

    logger.info('Sim', `GameSimulation created ${aw}×${ah}`);
  }

  init() {
    this.tanks = []; this.bullets = []; this.tick = 0;
    this.walls = this.wallGen.generate(this.AW, this.AH, this.cfg.WALL_COUNT, this.round);
    for (let i = 0; i < this.tankCount; i++) {
      const pos = this._findSpawn();
      const tank = new TankEntity(i, NAMES[i%12], COLORS[i%12], pos);
      try {
        tank.cortex = new CortexAdapter(this.BrainCtor, `t${i}_r${this.round}_${Date.now()}`, { lr: 0.012 + Math.random()*0.006 });
      } catch (e) {
        logger.error('Sim', `Failed to create brain for ${tank.name}: ${e.message}`);
        throw e;
      }
      this.tanks.push(tank);
      if (!this.leaderboard.has(tank.name)) this.leaderboard.set(tank.name, {kills:0,deaths:0,damage:0,wins:0});
    }
    this.log.add('spawn', `Round ${this.round}: ${this.tankCount} tanks deployed`, this.tick);
    logger.info('Sim', `Round ${this.round} initialized, ${this.tankCount} tanks`);
  }

  step() {
    if (!this.running) return;
    for (let s = 0; s < this.speed; s++) this._tick();
  }

  _tick() {
    this.tick++;
    const c = this.cfg;
    const alive = this.tanks.filter(t => t.alive);

    if (alive.length <= 1) {
      if (alive.length === 1) {
        alive[0].wins++;
        const lb = this.leaderboard.get(alive[0].name); if (lb) lb.wins++;
        this.log.add('win', `🏆 ${alive[0].name} wins Round ${this.round}!`, this.tick);
        logger.info('Sim', `${alive[0].name} wins round ${this.round}`);
      } else { this.log.add('win', `Round ${this.round} — draw`, this.tick); }
      this.round++; this.init(); return;
    }

    for (const tank of this.tanks) {
      if (!tank.alive) { if (--tank.respawnTimer <= 0) this._respawn(tank); continue; }
      if (tank.reload > 0) tank.reload--;

      let nearest = null, nDist = Infinity;
      for (const o of alive) { if (o.id === tank.id) continue; const d = V2.dist(tank.pos,o.pos); if (d < nDist){nDist=d;nearest=o;} }

      const sv = this.sensors.build(tank, this.tanks, this.bullets, this.walls, this.tick);
      const fr = this.rewards.compute(tank, nearest, this.walls, tank.prevPos);
      tank.lastReward = fr;

      const events = tank.pendingEvents.length > 0 ? tank.pendingEvents.splice(0) : null;
      const result = tank.cortex.forward(sv, fr, events);
      const cmd    = this.interp.interpret(result, tank, nearest);
      tank.cortex.learnFromReward(fr);

      tank.prevPos = V2.copy(tank.pos);
      tank.angle += clamp(normAngle(cmd.moveAngle - tank.angle), -c.TANK_ROT, c.TANK_ROT);
      tank.turretAngle += clamp(normAngle(cmd.aimAngle - tank.turretAngle), -c.TURRET_ROT, c.TURRET_ROT);

      const vel = V2.fromAngle(tank.angle, c.TANK_SPEED * cmd.speed);
      const np = this.physics.trySlide(tank.pos, vel, c.TANK_R, this.walls, this.tanks, tank.id);
      if (np) tank.pos = np;
      else tank.cortex.learnFromReward(c.R_WALL_BUMP);

      if (cmd.shoot && tank.reload <= 0) {
        tank.reload = tank.reloadTime; tank.shotsFired++;
        const bx = tank.pos.x + Math.cos(tank.turretAngle)*c.BARREL_LEN;
        const by = tank.pos.y + Math.sin(tank.turretAngle)*c.BARREL_LEN;
        this.bullets.push(new BulletEntity(bx, by, Math.cos(tank.turretAngle)*c.BULLET_SPEED, Math.sin(tank.turretAngle)*c.BULLET_SPEED, tank.id, c.BULLET_DMG));
        this.particles.emit(bx, by, tank.color, 3, 2);
      }
      tank.trail.push(V2.copy(tank.pos));
      if (tank.trail.length > tank.trailMax) tank.trail.shift();
    }

    for (let i = this.bullets.length-1; i >= 0; i--) {
      const b = this.bullets[i];
      b.pos.x += b.vel.x; b.pos.y += b.vel.y;
      if (--b.life <= 0 || b.pos.x<0 || b.pos.x>this.AW || b.pos.y<0 || b.pos.y>this.AH) { this.bullets.splice(i,1); continue; }
      if (this.physics.pointInWall(b.pos.x, b.pos.y, this.walls)) { this.particles.emit(b.pos.x,b.pos.y,'#777',4,1.5); this.bullets.splice(i,1); continue; }

      for (const tank of this.tanks) {
        if (!tank.alive || tank.id === b.owner) continue;
        if (V2.distSq(tank.pos, b.pos) < c.TANK_R**2) {
          tank.hp -= b.dmg; tank.lastHitBy = b.owner;
          tank.pendingEvents.push({ type: 'damage_received', damage: b.dmg });
          const sh = this.tanks[b.owner];
          if (sh) { sh.totalDamage += b.dmg; sh.shotsHit++; sh.cortex.learnFromReward(c.R_HIT); sh.pendingEvents.push({type:'hit_dealt'}); const lb=this.leaderboard.get(sh.name); if(lb)lb.damage+=b.dmg; }
          tank.cortex.learnFromReward(c.R_DAMAGED);
          this.particles.emit(b.pos.x, b.pos.y, tank.color, 6, 2.5);
          this.bullets.splice(i, 1);
          if (tank.hp <= 0) this._kill(tank, b.owner);
          break;
        }
      }
    }
    this.particles.update();
  }

  _kill(tank, killerId) {
    const c = this.cfg;
    tank.alive = false; tank.deaths++; tank.respawnTimer = c.RESPAWN; tank.hp = 0;
    tank.cortex.learnFromReward(c.R_DEATH);
    tank.pendingEvents.push({ type: 'killed_by', killer: killerId });
    const lb = this.leaderboard.get(tank.name); if (lb) lb.deaths++;
    const killer = this.tanks[killerId];
    if (killer) {
      killer.kills++; killer.cortex.learnFromReward(c.R_KILL);
      killer.pendingEvents.push({ type: 'enemy_defeated' });
      const klb = this.leaderboard.get(killer.name); if (klb) klb.kills++;
      this.log.add('kill', `💀 ${killer.name} → ${tank.name}`, this.tick);
    }
    this.particles.emit(tank.pos.x, tank.pos.y, tank.color, 20, 4);
    this.particles.emit(tank.pos.x, tank.pos.y, '#f80', 15, 3);
  }

  _respawn(tank) {
    const pos = this._findSpawn();
    tank.pos = V2.copy(pos); tank.prevPos = V2.copy(pos);
    tank.hp = tank.maxHp; tank.alive = true; tank.angle = Math.random()*Math.PI*2;
    tank.turretAngle = tank.angle; tank.reload = 0; tank.trail = []; tank.lastReward = 0;
    tank.cortex.reset();
    this.log.add('spawn', `🔄 ${tank.name} respawned`, this.tick);
  }

  _findSpawn() {
    for (let a = 0; a < 80; a++) {
      const x = 60+Math.random()*(this.AW-120), y = 60+Math.random()*(this.AH-120);
      if (!this.physics.hitsWall(x,y,this.cfg.TANK_R+10,this.walls) && !this.physics.hitsTank(x,y,this.cfg.TANK_R+20,this.tanks,-1)) return {x,y};
    }
    return {x:this.AW/2, y:this.AH/2};
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// 7. RENDERER (S: only draws)
// ═══════════════════════════════════════════════════════════════════════════

class ArenaRenderer {
  constructor(canvas, sim) {
    this.canvas = canvas; this.ctx = canvas.getContext('2d'); this.sim = sim;
    this.dpr = window.devicePixelRatio || 1;
    this._resize();
    window.addEventListener('resize', () => this._resize());
  }

  _resize() {
    const w = this.canvas.parentElement.clientWidth, h = this.canvas.parentElement.clientHeight;
    this.canvas.width = w*this.dpr; this.canvas.height = h*this.dpr;
    this.canvas.style.width = w+'px'; this.canvas.style.height = h+'px';
    this.scale = Math.min(w/this.sim.AW, h/this.sim.AH) * this.dpr;
    this.ox = (w*this.dpr - this.sim.AW*this.scale)/2;
    this.oy = (h*this.dpr - this.sim.AH*this.scale)/2;
  }

  render() {
    const ctx=this.ctx, sim=this.sim, c=sim.cfg;
    ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
    ctx.save(); ctx.translate(this.ox,this.oy); ctx.scale(this.scale,this.scale);

    ctx.fillStyle='#060910'; ctx.fillRect(0,0,sim.AW,sim.AH);
    ctx.strokeStyle='#0d1117'; ctx.lineWidth=.5;
    for(let x=0;x<=sim.AW;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,sim.AH);ctx.stroke()}
    for(let y=0;y<=sim.AH;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(sim.AW,y);ctx.stroke()}
    ctx.strokeStyle='#1c2537'; ctx.lineWidth=2; ctx.strokeRect(0,0,sim.AW,sim.AH);

    for(const w of sim.walls){ctx.fillStyle='#1c2537';ctx.fillRect(w.x,w.y,w.w,w.h);ctx.strokeStyle='#2d3a50';ctx.lineWidth=.8;ctx.strokeRect(w.x,w.y,w.w,w.h)}

    for(const t of sim.tanks){if(!t.alive||t.trail.length<2)continue;ctx.beginPath();ctx.moveTo(t.trail[0].x,t.trail[0].y);for(let i=1;i<t.trail.length;i++)ctx.lineTo(t.trail[i].x,t.trail[i].y);ctx.strokeStyle=t.color+'18';ctx.lineWidth=3;ctx.stroke()}

    for(const b of sim.bullets){const o=sim.tanks[b.owner];const cl=o?o.color:'#fff';ctx.beginPath();ctx.arc(b.pos.x,b.pos.y,2.5,0,Math.PI*2);ctx.fillStyle=cl;ctx.fill();ctx.beginPath();ctx.moveTo(b.pos.x,b.pos.y);ctx.lineTo(b.pos.x-b.vel.x*3,b.pos.y-b.vel.y*3);ctx.strokeStyle=cl+'60';ctx.lineWidth=1.5;ctx.stroke()}

    for(const t of sim.tanks){
      const R=c.TANK_R;
      if(!t.alive){ctx.save();ctx.translate(t.pos.x,t.pos.y);ctx.globalAlpha=.25;ctx.strokeStyle=t.color;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-7,-7);ctx.lineTo(7,7);ctx.stroke();ctx.beginPath();ctx.moveTo(7,-7);ctx.lineTo(-7,7);ctx.stroke();ctx.font='8px system-ui';ctx.textAlign='center';ctx.fillStyle=t.color;ctx.fillText(Math.ceil(t.respawnTimer/60)+'s',0,15);ctx.restore();continue}

      ctx.save(); ctx.translate(t.pos.x,t.pos.y);
      if(sim.selectedTankId===t.id){ctx.beginPath();ctx.arc(0,0,R+7,0,Math.PI*2);ctx.strokeStyle=t.color+'50';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([])}

      const em = t.cortex.getEmotions();
      const au = (em.aggression||0)>.4?['231,76,60',em.aggression]:(em.fear||0)>.4?['241,196,15',em.fear]:(em.confidence||0)>.4?['46,204,113',em.confidence]:null;
      if(au){ctx.beginPath();ctx.arc(0,0,R+4,0,Math.PI*2);ctx.strokeStyle=`rgba(${au[0]},${au[1]*.35})`;ctx.lineWidth=2;ctx.stroke()}

      ctx.beginPath();ctx.arc(0,0,R,0,Math.PI*2);
      const gr=ctx.createRadialGradient(0,-3,2,0,0,R);gr.addColorStop(0,t.color+'dd');gr.addColorStop(1,t.color+'77');
      ctx.fillStyle=gr;ctx.fill();ctx.strokeStyle=t.color;ctx.lineWidth=1.2;ctx.stroke();

      ctx.save();ctx.rotate(t.turretAngle);ctx.fillStyle=t.color;ctx.fillRect(R-6,-2.5,c.BARREL_LEN-R+10,5);ctx.fillStyle=t.color+'cc';ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fill();ctx.restore();

      const hp=t.hp/t.maxHp,bw=R*2+4,bh=3,by=-R-9;
      ctx.fillStyle='#000a';ctx.fillRect(-bw/2,by,bw,bh);
      ctx.fillStyle=hp>.6?'#2ecc71':hp>.3?'#f1c40f':'#e74c3c';ctx.fillRect(-bw/2,by,bw*hp,bh);

      if(t.reload>0){ctx.beginPath();ctx.arc(0,0,R+3,-Math.PI/2,-Math.PI/2+Math.PI*2*(1-t.reload/t.reloadTime));ctx.strokeStyle='#ffffff20';ctx.lineWidth=1.5;ctx.stroke()}

      ctx.fillStyle='#ffffffbb';ctx.font='bold 8px system-ui';ctx.textAlign='center';ctx.fillText(t.name,0,R+13);
      ctx.restore();
    }

    for(const p of sim.particles.items){const a=p.life/p.maxLife;ctx.beginPath();ctx.arc(p.x,p.y,1+a*2,0,Math.PI*2);ctx.fillStyle=p.color+Math.floor(a*200).toString(16).padStart(2,'0');ctx.fill()}

    ctx.restore();
  }

  screenToArena(sx,sy){const r=this.canvas.getBoundingClientRect();return{x:(sx-r.left-this.ox/this.dpr)/(this.scale/this.dpr),y:(sy-r.top-this.oy/this.dpr)/(this.scale/this.dpr)}}
}

// ═══════════════════════════════════════════════════════════════════════════
// 8. UI CONTROLLER (S: only manages DOM)
// ═══════════════════════════════════════════════════════════════════════════

class UIController {
  constructor(sim, renderer) {
    this.sim = sim; this.renderer = renderer;
    this._fps = 0; this._frames = 0; this._lastFps = performance.now();
    this._bind();
  }

  _bind() {
    const sim = this.sim;
    document.getElementById('btn-go').addEventListener('click', () => {
      if (!sim.running) { sim.init(); sim.running = true; document.getElementById('overlay').classList.remove('show'); document.getElementById('btn-go').textContent = '⏸ PAUSE'; logger.info('UI','Started'); }
      else { sim.running = !sim.running; document.getElementById('btn-go').textContent = sim.running ? '⏸ PAUSE' : '▶ RESUME'; }
    });
    document.getElementById('btn-rst').addEventListener('click', () => {
      sim.running = false; sim.round = 1; sim.leaderboard.clear(); sim.log.clear(); sim.init();
      document.getElementById('btn-go').textContent = '▶ START';
      document.getElementById('overlay').classList.add('show');
      document.getElementById('ov-title').textContent = 'CORTEX ARENA';
      document.getElementById('ov-text').textContent = 'Press START to begin';
      document.getElementById('load-error').innerHTML = '';
      this.update(); logger.info('UI','Reset');
    });
    document.getElementById('sel-spd').addEventListener('change', e => { sim.speed = parseInt(e.target.value); });
    document.getElementById('sel-cnt').addEventListener('change', e => { sim.tankCount = parseInt(e.target.value); if (sim.running) { sim.round++; sim.init(); } });
    this.renderer.canvas.addEventListener('click', e => {
      const p = this.renderer.screenToArena(e.clientX, e.clientY);
      let cl = null, cd = 35;
      for (const t of sim.tanks) { const d = V2.dist(t.pos, p); if (d < cd) { cd = d; cl = t.id; } }
      sim.selectedTankId = cl;
    });
  }

  update() {
    this._frames++;
    const now = performance.now();
    if (now - this._lastFps >= 1000) { this._fps = this._frames; this._frames = 0; this._lastFps = now; }
    const sim = this.sim;
    document.getElementById('h-rnd').textContent = sim.round;
    document.getElementById('h-tick').textContent = sim.tick;
    document.getElementById('h-alive').textContent = sim.tanks.filter(t => t.alive).length;
    document.getElementById('h-fps').textContent = this._fps;
    this._tankList(); this._detail(); this._log(); this._globalStats(); this._lb();
  }

  _tankList() {
    const el = document.getElementById('tank-list');
    let h = '';
    for (const t of this.sim.tanks) {
      const sel = this.sim.selectedTankId === t.id;
      const hp = (t.hp/t.maxHp*100)|0;
      const hc = t.hp/t.maxHp>.6?'var(--green)':t.hp/t.maxHp>.3?'var(--yellow)':'var(--red)';
      const em = t.cortex.getEmotions();
      const top = Object.entries(em).filter(([,v])=>v>0.01).sort((a,b)=>b[1]-a[1])[0];
      h += `<div class="card${sel?' sel':''}" data-id="${t.id}"><div class="top"><span class="dot" style="background:${t.color}"></span><span class="nm">${t.name}</span><span class="st">${t.alive?'ALIVE':'DEAD'}</span></div><div class="bar"><div class="fill" style="width:${hp}%;background:${hc}"></div></div><div class="row"><span>K/D</span><span class="v">${t.kills}/${t.deaths}</span></div><div class="row"><span>Acc</span><span class="v">${t.shotsFired>0?((t.accuracy*100)|0)+'%':'—'}</span></div><div class="row"><span>Emotion</span><span class="v">${top?top[0]+' '+((top[1]*100)|0)+'%':'calm'}</span></div></div>`;
    }
    el.innerHTML = h;
    el.querySelectorAll('.card').forEach(c => c.addEventListener('click', () => { this.sim.selectedTankId = parseInt(c.dataset.id); }));
  }

  _detail() {
    const el = document.getElementById('detail');
    if (this.sim.selectedTankId === null) { el.innerHTML = '<p style="color:var(--muted);font-size:11px">Click a tank to inspect</p>'; return; }
    const t = this.sim.tanks[this.sim.selectedTankId]; if (!t) return;
    const em = t.cortex.getEmotions();
    const debug = t.cortex.getDebugInfo();
    const stats = t.cortex.getStats();
    let emH = '<div class="egrid">';
    for (const [k,v] of Object.entries(em)) { const c = v>.5?'var(--red)':v>.25?'var(--yellow)':'var(--green)'; emH += `<div class="ei"><span>${k}</span><span class="ev" style="color:${c}">${(v*100)|0}</span></div>`; }
    emH += '</div>';
    el.innerHTML = `<div class="card sel" style="border-color:${t.color}"><div class="top"><span class="dot" style="background:${t.color}"></span><span class="nm">${t.name}</span><span class="st">${t.alive?'ALIVE':'RESPAWN '+Math.ceil(t.respawnTimer/60)+'s'}</span></div></div>
    <div class="ptitle" style="margin-top:8px">Vitals</div>
    <div class="row"><span>HP</span><span class="v">${t.hp|0}/${t.maxHp}</span></div><div class="bar"><div class="fill" style="width:${t.hp/t.maxHp*100}%;background:${t.hp/t.maxHp>.5?'var(--green)':'var(--red)'}"></div></div>
    <div class="row"><span>Kills</span><span class="v">${t.kills}</span></div>
    <div class="row"><span>Deaths</span><span class="v">${t.deaths}</span></div>
    <div class="row"><span>Damage</span><span class="v">${t.totalDamage|0}</span></div>
    <div class="row"><span>Accuracy</span><span class="v">${t.shotsFired>0?((t.accuracy*100)|0)+'%':'—'}</span></div>
    <div class="row"><span>Wins</span><span class="v">${t.wins}</span></div>
    <div class="ptitle" style="margin-top:8px">Neural</div>
    <div class="row"><span>Brain Step</span><span class="v">${t.cortex.getStep()}</span></div>
    <div class="row"><span>Pred Error</span><span class="v">${((debug.predictionError||0)*100).toFixed(1)}%</span></div>
    <div class="row"><span>Cum Reward</span><span class="v">${t.cortex.getCumulativeReward().toFixed(2)}</span></div>
    <div class="row"><span>TD Steps</span><span class="v">${stats.totalSteps??0}</span></div>
    <div class="row"><span>Grad Clips</span><span class="v">${stats.gradientClips??0}</span></div>
    <div class="row"><span>Memory Cons</span><span class="v">${stats.consolidationEvents??0}</span></div>
    <div class="ptitle" style="margin-top:8px">Emotions</div>${emH}`;
  }

  _log() {
    const el = document.getElementById('blog');
    let h = '';
    for (const e of this.sim.log.entries.slice(0,30)) h += `<div class="log ${e.type}">[${e.tick}] ${e.msg}</div>`;
    // Append system logger errors
    const sysErrors = logger.getEntries(Logger.Level.ERROR).slice(-5);
    for (const e of sysErrors) h += `<div class="log error">[SYS] ${e.message}</div>`;
    el.innerHTML = h;
  }

  _globalStats() {
    const el = document.getElementById('gstats');
    const tanks = this.sim.tanks;
    const emMap = {threat:'Threat',frustration:'Frustrat',confidence:'Confid',aggression:'Aggress',fear:'Fear',desperation:'Desperat',vengeance:'Vengean',curiosity:'Curiosi'};
    let h = '';
    for (const [key,label] of Object.entries(emMap)) {
      let sum = 0; for (const t of tanks) { const em = t.cortex.getEmotions(); sum += em[key]||0; }
      const avg = sum/tanks.length, pct = (avg*100)|0;
      const c = key==='confidence'?'var(--green)':avg>.4?'var(--red)':avg>.2?'var(--yellow)':'var(--cyan)';
      h += `<div class="crow"><span class="cl">${label}</span><div class="ct"><div class="cf" style="width:${pct}%;background:${c}"></div></div><span class="cv">${pct}%</span></div>`;
    }
    const tK=tanks.reduce((s,t)=>s+t.kills,0), tS=tanks.reduce((s,t)=>s+t.shotsFired,0), tH=tanks.reduce((s,t)=>s+t.shotsHit,0);
    h += `<div style="margin-top:6px"><div class="row"><span>Kills</span><span class="v">${tK}</span></div><div class="row"><span>Shots</span><span class="v">${tS}</span></div><div class="row"><span>Accuracy</span><span class="v">${tS>0?((tH/tS*100)|0)+'%':'—'}</span></div><div class="row"><span>Bullets</span><span class="v">${this.sim.bullets.length}</span></div></div>`;
    el.innerHTML = h;
  }

  _lb() {
    const body = document.getElementById('lb-body');
    const rows = [...this.sim.leaderboard.entries()].map(([n,s])=>({name:n,...s}));
    rows.sort((a,b)=>(b.kills-b.deaths)-(a.kills-a.deaths)||b.damage-a.damage);
    let h=''; rows.forEach((r,i)=>{const t=this.sim.tanks.find(t=>t.name===r.name);const c=t?t.color:'var(--text)';h+=`<tr><td>${i+1}</td><td style="color:${c};font-weight:600">${r.name}</td><td>${r.kills}</td><td>${r.deaths}</td><td>${r.damage|0}</td><td>${r.wins}</td></tr>`});
    body.innerHTML=h;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// 9. BOOTSTRAP — Async loader with full error handling
// ═══════════════════════════════════════════════════════════════════════════

async function main() {
  const statusEl  = document.getElementById('h-cortex-status');
  const ovText    = document.getElementById('ov-text');
  const loadError = document.getElementById('load-error');
  const btnGo     = document.getElementById('btn-go');

  logger.info('Boot', 'Starting Cortex Arena v4');
  logger.info('Boot', `URL: ${window.location.href}`);
  logger.info('Boot', `User Agent: ${navigator.userAgent}`);

  let BrainCtor;
  try {
    BrainCtor = await CortexLoader.load();
    statusEl.textContent = '✓ Cortex loaded';
    statusEl.style.color = 'var(--green)';
    ovText.textContent = 'Neural engine ready. Press START to begin.';
    btnGo.disabled = false;
    logger.info('Boot', `Cortex2Brain loaded, constructor: ${BrainCtor.name || 'anonymous'}`);
  } catch (e) {
    statusEl.textContent = '✗ Load failed';
    statusEl.style.color = 'var(--red)';
    document.getElementById('ov-title').textContent = 'LOAD ERROR';
    ovText.innerHTML = 'Could not load <code>cortex.js</code>. Ensure the file is in the correct location.';
    loadError.innerHTML = `<div class="err">${e.message}</div><div class="paths">Expected file structure on GitHub Pages:<br><br>  your-repo/<br>  ├── index.html  (this file)<br>  └── cortex.js   (neural engine)</div>`;
    logger.error('Boot', 'Fatal: failed to load cortex.js', e);
    return; // Stop — don't start game loop
  }

  // Verify brain works end-to-end
  try {
    const testBrain = new BrainCtor({ seed: '__integration_test__' });
    const testResult = testBrain.forward(new Array(64).fill(0), 0);
    if (!testResult || !Array.isArray(testResult.output) || testResult.output.length < 16) {
      throw new Error(`forward() returned invalid result: output length ${testResult?.output?.length}`);
    }
    const testLearn = testBrain.tdLearn([], [], 1.0);
    logger.info('Boot', `Integration test passed: output[0]=${testResult.output[0].toFixed(4)}, tdError=${testLearn?.tdError?.toFixed(4) ?? 'N/A'}`);
  } catch (e) {
    statusEl.textContent = '✗ Brain test failed';
    statusEl.style.color = 'var(--red)';
    loadError.innerHTML = `<div class="err">cortex.js loaded but integration test failed:\n${e.message}\n\nThis usually means the Cortex2Brain API has changed.</div>`;
    logger.error('Boot', 'Integration test failed', e);
    return;
  }

  // Create game
  const sim = new GameSimulation(1200, 800, BrainCtor);
  const renderer = new ArenaRenderer(document.getElementById('c'), sim);
  const ui = new UIController(sim, renderer);

  // Global error handler for runtime errors
  window.addEventListener('error', (e) => {
    logger.error('Runtime', `${e.message} at ${e.filename}:${e.lineno}:${e.colno}`);
  });
  window.addEventListener('unhandledrejection', (e) => {
    logger.error('Runtime', `Unhandled promise rejection: ${e.reason}`);
  });

  let uiCounter = 0;
  function gameLoop() {
    requestAnimationFrame(gameLoop);
    try {
      sim.step();
      renderer.render();
    } catch (e) {
      logger.error('GameLoop', `Tick error: ${e.message}`);
      sim.running = false;
      document.getElementById('btn-go').textContent = '▶ RESUME';
    }
    if (++uiCounter % 6 === 0) {
      try { ui.update(); }
      catch (e) { logger.error('UI', `Update error: ${e.message}`); }
    }
  }

  gameLoop();
  logger.info('Boot', 'Game loop running. Ready to play.');
}

main().catch(e => {
  console.error('Fatal bootstrap error:', e);
  document.getElementById('ov-text').innerHTML = `<span style="color:var(--red)">Fatal error: ${e.message}</span>`;
});
</script>
